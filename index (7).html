<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Tabula Rasa</title>
<meta name="description" content="A space to create universes. Coming soon.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23080808'/><text x='50' y='72' font-family='monospace' font-size='55' font-weight='300' fill='%23f4f3ef' text-anchor='middle'>{ }</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#080808;color:#f4f3ef;font-family:'Syne',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}

.logo{font-family:'DM Mono',monospace;font-size:clamp(5rem,18vw,9rem);font-weight:300;line-height:1;letter-spacing:-0.02em;margin-bottom:1.5rem;animation:fadeUp 0.8s ease both;}

.name{font-size:clamp(0.75rem,2vw,1rem);font-weight:800;letter-spacing:0.35em;text-transform:uppercase;color:#c8c7c3;margin-bottom:3rem;animation:fadeUp 0.8s ease 0.15s both;}

.tagline{font-family:'DM Mono',monospace;font-size:clamp(0.75rem,2vw,0.9rem);font-weight:300;color:#7a7a78;letter-spacing:0.08em;margin-bottom:4rem;text-align:center;line-height:1.8;animation:fadeUp 0.8s ease 0.25s both;}

.divider{width:40px;height:0.5px;background:#2a2a2a;margin:0 auto 3rem;animation:fadeUp 0.8s ease 0.3s both;}

.form-wrap{width:100%;max-width:400px;animation:fadeUp 0.8s ease 0.35s both;}

.form-label{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:#7a7a78;display:block;margin-bottom:0.4rem;}

.fi{width:100%;background:transparent;border:0.5px solid rgba(255,255,255,0.12);color:#f4f3ef;padding:0.75rem 1rem;font-family:'DM Mono',monospace;font-size:0.8rem;font-weight:300;outline:none;transition:border-color 0.2s;margin-bottom:0.75rem;}
.fi::placeholder{color:rgba(255,255,255,0.18);}
.fi:focus{border-color:rgba(255,255,255,0.35);}

.fs{width:100%;background:#080808;border:0.5px solid rgba(255,255,255,0.12);color:#f4f3ef;padding:0.75rem 1rem;font-family:'DM Mono',monospace;font-size:0.8rem;font-weight:300;outline:none;margin-bottom:0.75rem;appearance:none;}
.fs option{background:#080808;}

.sub-btn{width:100%;padding:0.9rem;background:#f4f3ef;color:#080808;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;transition:background 0.2s;margin-top:0.5rem;}
.sub-btn:hover{background:#c8c7c3;}

.ok-msg{display:none;font-family:'DM Mono',monospace;font-size:0.76rem;color:#f4f3ef;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.12);padding:1rem;margin-top:1rem;line-height:1.7;font-weight:300;text-align:center;}

.links{display:flex;gap:2rem;margin-top:3rem;animation:fadeUp 0.8s ease 0.5s both;}
.link{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:#7a7a78;text-decoration:none;transition:color 0.2s;}
.link:hover{color:#f4f3ef;}

.footer{position:fixed;bottom:1.5rem;font-family:'DM Mono',monospace;font-size:0.6rem;color:rgba(255,255,255,0.15);letter-spacing:0.1em;text-transform:uppercase;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="logo">{ }</div>
<div class="name">A Tabula Rasa</div>
<div class="tagline">A space to create universes.<br>Something is coming.</div>
<div class="divider"></div>

<div class="form-wrap">
  <form id="notify-form" action="https://formspree.io/f/xykbnpwe" method="POST">
    <input class="fi" type="text" name="name" placeholder="Your name" required>
    <input class="fi" type="email" name="email" placeholder="your@email.com" required>
    <input class="fi" type="text" name="city" placeholder="City & country">
    <select class="fs" name="role">
      <option value="">Who are you?</option>
      <option>Creator — artist, designer, muralist</option>
      <option>Space owner — I have a surface</option>
      <option>Community — I want to participate</option>
      <option>Partner / Ally</option>
      <option>Just curious</option>
    </select>
    <button type="submit" class="sub-btn">Notify me →</button>
    <div class="ok-msg" id="notify-ok">You're in.<br>We'll be in touch when the time comes.</div>
  </form>
</div>

<div class="links">
  <a href="https://www.instagram.com/a.tabularasa/" target="_blank" class="link">@a.tabularasa</a>
  <a href="mailto:info@atabularasa.com" class="link">info@atabularasa.com</a>
</div>

<div class="footer">© A Tabula Rasa 2025</div>

<script>
document.getElementById('notify-form').addEventListener('submit',function(e){
  e.preventDefault();
  var data=new FormData(this);
  fetch(this.action,{method:'POST',body:data,headers:{'Accept':'application/json'}})
    .then(function(r){
      if(r.ok){
        document.getElementById('notify-ok').style.display='block';
        document.getElementById('notify-form').style.opacity='0.2';
        document.getElementById('notify-form').style.pointerEvents='none';
      }
    });
});
</script>
</body>
</html>
